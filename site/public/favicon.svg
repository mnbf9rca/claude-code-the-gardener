<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="6" fill="#0D0B07"/>
  <!-- Leaf body: pointed oval, symmetric, in amber -->
  <path d="M16 27 C10 23 4 16 6 9 C8 3 13 2 16 5 C19 2 24 3 26 9 C28 16 22 23 16 27 Z" fill="#F0A32C"/>
  <!-- Center vein: dark line through leaf -->
  <line x1="16" y1="26" x2="16" y2="6" stroke="#0D0B07" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
  <!-- Stem -->
  <line x1="16" y1="27" x2="16" y2="30" stroke="#F0A32C" stroke-width="2" stroke-linecap="round"/>
</svg>
